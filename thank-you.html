<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thank You | Julio AI Workflow Studio</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        --ink: #17201d;
        --paper: #fbfaf6;
        --gold: #e5a946;
        --muted: #5f6964;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: var(--paper);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      main {
        width: min(680px, calc(100% - 40px));
        border: 1px solid #d8ded6;
        border-radius: 8px;
        padding: 42px;
        background: #ffffff;
        box-shadow: 0 18px 60px rgba(23, 32, 29, 0.12);
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 8vw, 58px);
        line-height: 1;
      }

      p {
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 18px;
      }

      a {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        margin-top: 28px;
        padding: 13px 18px;
        background: var(--gold);
        color: #1b160d;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Thanks. I received your request.</h1>
      <p>
        I’ll review the workflow details and follow up with the next useful step. Please do not send
        patient health information or sensitive personal data by email.
      </p>
      <a href="/">Back to the site</a>
    </main>
  </body>
</html>
